# Build backend image and push to Docker Hub.
# Repo Secrets required: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (Docker Hub PAT).
# EC2: set DOCKER_IMAGE=docker.io/USERNAME/evmbench-backend:latest (see backend/docs/DEPLOY-EC2.md).

name: Docker Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        id: meta
        run: |
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/evmbench-backend" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: docker/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
